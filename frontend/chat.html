<!DOCTYPE html>
<html>
<head>
  <title>DM Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      background: #243c83;
    }

    #sidebar {
      width: 30%;
      min-width: 260px;
      background: rgb(255, 181, 181);
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding-bottom: 20px;
    }

    .sidebar-header {
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
    }

    .section-title {
      padding: 15px 18px 8px;
      font-size: 13px;
      color: #777;
      text-transform: uppercase;
      font-weight: bold;
    }

    .user {
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 1px solid #f1f1f1;
      transition: 0.2s;
    }

    .user:hover {
      background: #f5f5f5;
    }

    .active {
      background: #e8f3ff;
      font-weight: bold;
    }

    #createGroupBtn {
      margin: 10px 18px;
      padding: 10px;
      width: calc(100% - 36px);
      border: none;
      border-radius: 8px;
      background: #7c0000;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #chatSection {
      flex: 1;
      display: flex;
      flex-direction: column;
      background:  #ffefef
    }

    #chatHeader {
      height: 60px;
      padding: 18px;
      border-bottom: 1px solid #ddd;
      background: white;
      font-weight: bold;
      font-size: 18px;
    }

    #chat {
      flex: 1;
      list-style: none;
      padding: 20px;
      margin: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      max-width: 60%;
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 18px;
      word-wrap: break-word;
      font-size: 15px;
    }

    .sent {
      align-self: flex-end;
      background: #7c0000;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .received {
      align-self: flex-start;
      background: rgb(255, 181, 181);
      border: 1px solid rgb(255, 181, 181);
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .sender-name {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
      opacity: 0.75;
    }

    #inputArea {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      background: white;
    }

    #message {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
      font-size: 15px;
    }

    #sendBtn {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 20px;
      background: #7c0000;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #sendBtn:hover,
    #createGroupBtn:hover {
      background: #0077cc;
    }

    #logoutBtn {
      margin: 12px 18px;
      padding: 9px;
      width: calc(100% - 36px);
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }

    .empty {
      color: #888;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div id="sidebar">
    <div class="sidebar-header">DM Chat</div>

    <button id="logoutBtn">Logout</button>

    <div class="section-title">Users</div>
    <div id="users"></div>

    <div class="section-title">Groups</div>
    <button id="createGroupBtn">+ Create Group</button>
    <div id="groups"></div>
  </div>

  <div id="chatSection">
    <div id="chatHeader">Select a chat</div>

    <ul id="chat">
      <div class="empty">Choose a user or group to start chatting</div>
    </ul>

    <div id="inputArea">
      <input id="message" placeholder="Message..." autocomplete="off">
      <button type="button" id="sendBtn">Send</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>
    const socket = io();

    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
      location.href = "login.html";
    }

    socket.emit("join", user.username);

    let currentReceiver = null;
    let currentGroup = null;

    const usersDiv = document.getElementById("users");
    const groupsDiv = document.getElementById("groups");
    const chat = document.getElementById("chat");
    const chatHeader = document.getElementById("chatHeader");
    const messageInput = document.getElementById("message");

    function clearActive() {
      document.querySelectorAll(".user").forEach(el => {
        el.classList.remove("active");
      });
    }

    function addMessage(sender, text, isGroupMessage = false) {
      const li = document.createElement("li");
      li.className = "message " + (sender === user.username ? "sent" : "received");

      if (isGroupMessage && sender !== user.username) {
        li.innerHTML = `
          <div class="sender-name">${sender}</div>
          <div>${text}</div>
        `;
      } else {
        li.innerText = text;
      }

      chat.appendChild(li);
      chat.scrollTop = chat.scrollHeight;
    }

    function loadUsers() {
      fetch("/users")
        .then(res => res.json())
        .then(data => {
          usersDiv.innerHTML = "";

          data.forEach(u => {
            if (u.username !== user.username) {
              const div = document.createElement("div");
              div.className = "user";
              div.innerText = u.username;

              div.onclick = () => {
                currentReceiver = u.username;
                currentGroup = null;

                clearActive();
                div.classList.add("active");

                chatHeader.innerText = u.username;
                loadPrivateMessages(u.username);
              };

              usersDiv.appendChild(div);
            }
          });
        });
    }

    function loadGroups() {
      fetch(`/groups/${user.username}`)
        .then(res => res.json())
        .then(groups => {
          groupsDiv.innerHTML = "";

          groups.forEach(g => {
            const div = document.createElement("div");
            div.className = "user";
            div.innerText = "👥 " + g.name;

            div.onclick = () => {
              currentGroup = g.id;
              currentReceiver = null;

              socket.emit("join_group", g.id);

              clearActive();
              div.classList.add("active");

              chatHeader.innerText = g.name;
              loadGroupMessages(g.id);
            };

            groupsDiv.appendChild(div);
          });
        });
    }

    function loadPrivateMessages(otherUser) {
      fetch(`/messages/${user.username}/${otherUser}`)
        .then(res => res.json())
        .then(messages => {
          chat.innerHTML = "";

          if (messages.length === 0) {
            chat.innerHTML = `<div class="empty">No messages yet</div>`;
            return;
          }

          messages.forEach(m => {
            addMessage(m.sender, m.text, false);
          });
        });
    }

    function loadGroupMessages(groupId) {
      fetch(`/group-messages/${groupId}`)
        .then(res => res.json())
        .then(messages => {
          chat.innerHTML = "";

          if (messages.length === 0) {
            chat.innerHTML = `<div class="empty">No group messages yet</div>`;
            return;
          }

          messages.forEach(m => {
            addMessage(m.sender, m.text, true);
          });
        });
    }

    document.getElementById("sendBtn").onclick = () => {
      const text = messageInput.value.trim();

      if (!text) return;

      if (currentGroup) {
        socket.emit("send_group_message", {
          groupId: currentGroup,
          sender: user.username,
          text
        });
      } else if (currentReceiver) {
        socket.emit("send_message", {
          sender: user.username,
          receiver: currentReceiver,
          text
        });
      } else {
        alert("Select a user or group first");
        return;
      }

      messageInput.value = "";
    };

    messageInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        document.getElementById("sendBtn").click();
      }
    });

    socket.on("receive_message", (data) => {
      if (
        currentReceiver &&
        (data.sender === currentReceiver || data.receiver === currentReceiver)
      ) {
        const empty = document.querySelector(".empty");
        if (empty) chat.innerHTML = "";

        addMessage(data.sender, data.text, false);
      }
    });

    socket.on("receive_group_message", (data) => {
      if (currentGroup && Number(data.groupId) === Number(currentGroup)) {
        const empty = document.querySelector(".empty");
        if (empty) chat.innerHTML = "";

        addMessage(data.sender, data.text, true);
      }
    });

    document.getElementById("createGroupBtn").onclick = async () => {
      const groupName = prompt("Enter group name:");
      if (!groupName) return;

      const membersInput = prompt("Enter members separated by comma. Example: user2,user3");
      if (!membersInput) return;

      const members = membersInput
        .split(",")
        .map(m => m.trim())
        .filter(Boolean);

      if (!members.includes(user.username)) {
        members.push(user.username);
      }

      const res = await fetch("/groups", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: groupName,
          members
        })
      });

      const data = await res.json();
      alert(data.message);

      loadGroups();
    };

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("user");
      location.href = "login.html";
    };

    loadUsers();
    loadGroups();
  </script>

</body>
</html>
